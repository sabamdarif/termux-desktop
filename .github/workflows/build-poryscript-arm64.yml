name: Build Poryscript Linux ARM64

on:
    schedule:
        # Check for a new stable Poryscript release once a day at 06:30 UTC
        - cron: '30 6 * * *'
    workflow_dispatch:
        inputs:
            poryscript_ref:
                description: "Poryscript git ref to build (tag/branch — leave blank to use latest stable release)"
                required: false
                default: ""
            force_rebuild:
                description: "Rebuild even if the version hasn't changed"
                type: boolean
                default: false

permissions:
    contents: write

jobs:
    # -----------------------------------------------------------------------
    # 1. Detect whether a new stable Poryscript release exists
    # -----------------------------------------------------------------------
    check-version:
        name: Check latest Poryscript release
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        outputs:
            needs_build: ${{ steps.compare.outputs.needs_build }}
            poryscript_ref: ${{ steps.compare.outputs.poryscript_ref }}

        steps:
            - name: Get latest stable Poryscript release (no pre-releases)
              id: upstream
              run: |
                  LATEST=$(curl -fsSL \
                      -H "Accept: application/vnd.github+json" \
                      "https://api.github.com/repos/huderlem/poryscript/releases/latest" \
                      | jq -r '.tag_name')
                  if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
                      echo "ERROR: Could not fetch latest Poryscript release"
                      exit 1
                  fi
                  echo "Latest stable Poryscript release: $LATEST"
                  echo "tag=$LATEST" >> "$GITHUB_OUTPUT"

            - name: Get currently built version from prebuilt release
              id: current
              run: |
                  BUILT=$(curl -fsSL \
                      -H "Accept: application/vnd.github+json" \
                      -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
                      "https://api.github.com/repos/${{ github.repository }}/releases/tags/poryscript-prebuilt" \
                      | jq -r '.assets[] | select(.name == "poryscript-version.txt") | .browser_download_url') || true
                  if [ -n "$BUILT" ]; then
                      VERSION=$(curl -fsSL "$BUILT")
                      echo "Currently built version: $VERSION"
                      echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  else
                      echo "No existing prebuilt release found — will build."
                      echo "version=" >> "$GITHUB_OUTPUT"
                  fi

            - name: Determine whether a build is needed
              id: compare
              run: |
                  UPSTREAM="${{ steps.upstream.outputs.tag }}"
                  CURRENT="${{ steps.current.outputs.version }}"
                  FORCE="${{ github.event.inputs.force_rebuild }}"
                  MANUAL_REF="${{ github.event.inputs.poryscript_ref }}"

                  if [ -n "$MANUAL_REF" ]; then
                      echo "Manual ref provided: $MANUAL_REF — forcing build"
                      echo "needs_build=true" >> "$GITHUB_OUTPUT"
                      echo "poryscript_ref=$MANUAL_REF" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi

                  echo "poryscript_ref=$UPSTREAM" >> "$GITHUB_OUTPUT"

                  if [ "$UPSTREAM" != "$CURRENT" ] || [ "$FORCE" = "true" ]; then
                      echo "New version detected ($CURRENT → $UPSTREAM) or force=true — will build"
                      echo "needs_build=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "Already up-to-date ($CURRENT) — skipping build"
                      echo "needs_build=false" >> "$GITHUB_OUTPUT"
                  fi

    # -----------------------------------------------------------------------
    # 2. Build on a native ARM64 runner and publish the release
    # -----------------------------------------------------------------------
    build:
        name: Build (linux/arm64)
        needs: check-version
        if: needs.check-version.outputs.needs_build == 'true'
        runs-on: ubuntu-24.04-arm

        steps:
            - name: Install build dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y golang-go git

            - name: Clone Poryscript
              run: |
                  git clone --depth 1 --branch "${{ needs.check-version.outputs.poryscript_ref }}" \
                      https://github.com/huderlem/poryscript poryscript-src

            - name: Build Poryscript
              run: |
                  cd poryscript-src
                  go build -ldflags="-s -w" -o poryscript .

            - name: Prepare artifacts
              run: |
                  cp poryscript-src/poryscript poryscript-linux-arm64
                  echo "${{ needs.check-version.outputs.poryscript_ref }}" > poryscript-version.txt

            - name: Publish to GitHub Releases
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: poryscript-prebuilt
                  name: "Poryscript Linux ARM64 (pre-built binary)"
                  body: |
                      Pre-built Poryscript binary for **Linux ARM64**, for use inside termux-desktop proot/chroot containers.

                      | Field | Value |
                      |---|---|
                      | **Poryscript version** | `${{ needs.check-version.outputs.poryscript_ref }}` |
                      | **Architecture** | `aarch64` (ARM64) |
                      | **Built on** | `ubuntu-24.04-arm` (GitHub-hosted runner) |
                      | **Language** | Go (statically linked) |

                      ### Usage inside the container
                      The binary is installed to `/usr/local/bin/poryscript` and is available from any shell or Makefile inside the proot/chroot container.

                      ---
                      _This release is updated automatically by CI. Do not open pull requests against this tag._
                  files: |
                      poryscript-linux-arm64
                      poryscript-version.txt
                  make_latest: false
                  token: ${{ secrets.GITHUB_TOKEN }}
