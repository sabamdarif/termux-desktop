name: Build Turnip
on:
    push:
        paths:
            - ".github/workflows/turnip-builder.yml"
            - ".github/scripts/turnip.sh"
            - ".github/scripts/patches/**"
    pull_request:
        paths:
            - ".github/workflows/turnip-builder.yml"
            - ".github/scripts/turnip.sh"
            - ".github/scripts/patches/**"
    workflow_dispatch:
        inputs:
            mesa_version:
                description: "Mesa version to build (REQUIRED - no default)"
                required: true
                type: string
            action_type:
                description: "Choose action to perform"
                required: true
                default: "release"
                type: choice
                options:
                    - release
                    - build_only

env:
    MESA_VERSION: ${{ github.event.inputs.mesa_version || '' }}

permissions:
    contents: write

jobs:
    validate-inputs:
        runs-on: ubuntu-latest
        outputs:
            mesa_version: ${{ steps.validate.outputs.mesa_version }}
            action_type: ${{ steps.validate.outputs.action_type }}
        steps:
            - name: Checkout repository (for auto version detection)
              if: github.event_name == 'push' || github.event_name == 'pull_request'
              uses: actions/checkout@v5

            - name: Validate Mesa version
              id: validate
              run: |
                  if [ "${{ github.event_name }}" = "push" ] || [ "${{ github.event_name }}" = "pull_request" ]; then
                    # For push/PR events, extract TURNIP_MESA_VERSION from enable-hw-acceleration
                    MESA_VERSION=$(grep -oP 'TURNIP_MESA_VERSION="\K[^"]+' enable-hw-acceleration 2>/dev/null || echo "")
                    if [ -z "$MESA_VERSION" ]; then
                      echo "ERROR: Could not extract TURNIP_MESA_VERSION from enable-hw-acceleration"
                      exit 1
                    fi
                    ACTION_TYPE="build_only"
                    echo "Auto-triggered build — detected Mesa version: $MESA_VERSION"
                  else
                    MESA_VERSION="${{ env.MESA_VERSION }}"
                    if [ -z "$MESA_VERSION" ]; then
                      echo "ERROR: MESA_VERSION is required but not provided"
                      echo "Please specify a Mesa version when triggering this workflow manually"
                      exit 1
                    fi
                    ACTION_TYPE="${{ github.event.inputs.action_type }}"
                  fi
                  echo "mesa_version=$MESA_VERSION" >> $GITHUB_OUTPUT
                  echo "action_type=$ACTION_TYPE" >> $GITHUB_OUTPUT
                  echo "Using Mesa version: $MESA_VERSION"
                  echo "Action type: $ACTION_TYPE"

    build-ubuntu-arm64:
        needs: validate-inputs
        runs-on: ubuntu-24.04-arm
        strategy:
            matrix:
                arch: [aarch64, arm]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up QEMU for ARM32
              if: matrix.arch == 'arm'
              uses: docker/setup-qemu-action@v4
              with:
                  platforms: arm

            - name: Install dependencies (ARM64 native)
              if: matrix.arch == 'aarch64'
              run: |
                  sudo sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/ubuntu.sources
                  sudo apt update
                  sudo apt build-dep -y mesa
                  sudo apt install -y \
                    git ccache \
                    clang clang-tools llvm llvm-dev \
                    ninja-build patchelf unzip curl \
                    python3-pip python3-mako flex bison \
                    zip cmake glslang-tools

                  # Upgrade meson to latest version
                  sudo apt remove -y meson || true
                  sudo pip3 install --upgrade meson --break-system-packages

                  # Verify meson version
                  echo "Installed Meson version:"
                  meson --version

            - name: Install Docker (for ARM32 QEMU build)
              if: matrix.arch == 'arm'
              run: |
                  # Docker should already be available on ubuntu-24.04-arm runner
                  docker --version

            - name: Cache ccache (ARM64)
              if: matrix.arch == 'aarch64'
              uses: actions/cache@v4
              with:
                  path: ~/.ccache
                  key: ccache-turnip-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ github.run_id }}-${{ github.run_attempt }}
                  restore-keys: |
                      ccache-turnip-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-

            - name: Cache ccache (ARM32)
              if: matrix.arch == 'arm'
              uses: actions/cache@v4
              with:
                  path: ./.ccache-arm32
                  key: ccache-turnip-arm32-${{ github.run_id }}-${{ github.run_attempt }}
                  restore-keys: |
                      ccache-turnip-arm32-

            - name: Configure ccache (ARM64)
              if: matrix.arch == 'aarch64'
              run: |
                  export CCACHE_DIR=~/.ccache
                  ccache --max-size=2G
                  ccache --show-config
                  ccache --zero-stats
                  ccache --show-stats

            - name: Build Turnip for ${{ matrix.arch }}
              env:
                  MESA_VERSION: ${{ needs.validate-inputs.outputs.mesa_version }}
                  CCACHE_DIR: ~/.ccache
              run: |
                  cd .github/scripts
                  chmod +x turnip.sh
                  MESA_VERSION="${MESA_VERSION}" ./turnip.sh ${{ matrix.arch }}

            - name: Show ccache stats (ARM64)
              if: matrix.arch == 'aarch64'
              run: |
                  export CCACHE_DIR=~/.ccache
                  ccache --show-stats

            - name: Show ccache stats (ARM32)
              if: matrix.arch == 'arm'
              run: |
                  if [ -d ./.ccache-arm32 ]; then
                    du -sh ./.ccache-arm32
                  fi

            - name: Save ccache (ARM64)
              if: matrix.arch == 'aarch64'
              uses: actions/cache/save@v4
              with:
                  path: ~/.ccache
                  key: ccache-turnip-${{ runner.os }}-${{ runner.arch }}-${{ matrix.arch }}-${{ github.run_id }}-${{ github.run_attempt }}

            - name: Save ccache (ARM32)
              if: matrix.arch == 'arm'
              uses: actions/cache/save@v4
              with:
                  path: ./.ccache-arm32
                  key: ccache-turnip-arm32-${{ github.run_id }}-${{ github.run_attempt }}

            - name: Upload ${{ matrix.arch }} artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: turnip-${{ needs.validate-inputs.outputs.mesa_version }}-${{ matrix.arch }}
                  path: .github/scripts/turnip_workdir/turnip-${{ needs.validate-inputs.outputs.mesa_version }}-${{ matrix.arch }}.zip
                  retention-days: 30

            - name: Cleanup build directory
              if: always()
              run: |
                  # Use sudo to remove files created by Docker (owned by root)
                  if [ -d .github/scripts/turnip_workdir ]; then
                    sudo rm -rf .github/scripts/turnip_workdir
                  fi

    create-release:
        needs: [validate-inputs, build-ubuntu-arm64]
        if: needs.validate-inputs.outputs.action_type == 'release'
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Download all artifacts
              uses: actions/download-artifact@v4
              with:
                  path: ./artifacts

            - name: Build release notes with checksums
              shell: bash
              run: |
                  set -euo pipefail

                  MESA_VERSION="${{ needs.validate-inputs.outputs.mesa_version }}"

                  echo "## Turnip Mesa ${MESA_VERSION} - Android Vulkan Drivers" > release_body.md
                  echo "" >> release_body.md
                  echo "Built for Android ARM64 and ARM32 architectures" >> release_body.md
                  echo "" >> release_body.md
                  echo "### Checksums" >> release_body.md
                  echo '```plaintext' >> release_body.md

                  find ./artifacts -name "*.zip" -type f -exec sha256sum {} \; | \
                    awk '{print $1 "  " $2}' | \
                    sed 's|./artifacts/[^/]*/||' | \
                    sort -k2,2 >> release_body.md

                  echo '```' >> release_body.md

                  cat release_body.md

            - name: Validate artifacts exist
              run: |
                  MESA_VERSION="${{ needs.validate-inputs.outputs.mesa_version }}"
                  AARCH64_ARTIFACT="./artifacts/turnip-${MESA_VERSION}-aarch64/turnip-${MESA_VERSION}-aarch64.zip"
                  ARM_ARTIFACT="./artifacts/turnip-${MESA_VERSION}-arm/turnip-${MESA_VERSION}-arm.zip"

                  echo "Checking for required artifacts..."
                  echo "Expected aarch64 artifact: $AARCH64_ARTIFACT"
                  echo "Expected arm artifact: $ARM_ARTIFACT"

                  if [ ! -f "$AARCH64_ARTIFACT" ]; then
                    echo "ERROR: aarch64 artifact not found: $AARCH64_ARTIFACT"
                    echo "Available files in ./artifacts/:"
                    find ./artifacts/ -type f || true
                    exit 1
                  fi

                  if [ ! -f "$ARM_ARTIFACT" ]; then
                    echo "ERROR: arm artifact not found: $ARM_ARTIFACT"
                    echo "Available files in ./artifacts/:"
                    find ./artifacts/ -type f || true
                    exit 1
                  fi

                  echo "✅ Both artifacts found successfully"
                  echo "aarch64 artifact size: $(ls -lh "$AARCH64_ARTIFACT" | awk '{print $5}')"
                  echo "arm artifact size: $(ls -lh "$ARM_ARTIFACT" | awk '{print $5}')"

            - name: Update Mesa version in enable-hw-acceleration file
              run: |
                  sed -i 's/TURNIP_MESA_VERSION="[^"]*"/TURNIP_MESA_VERSION="${{ needs.validate-inputs.outputs.mesa_version }}"/g' enable-hw-acceleration
                  echo "Updated TURNIP_MESA_VERSION to: ${{ needs.validate-inputs.outputs.mesa_version }}"
                  grep "TURNIP_MESA_VERSION" enable-hw-acceleration

            - name: Commit and push version update
              run: |
                  git config --local user.email "github-actions[bot]@users.noreply.github.com"
                  git config --local user.name "GitHub Action"
                  git add enable-hw-acceleration
                  git commit -m "bump(turnip): ${{ needs.validate-inputs.outputs.mesa_version }}" || exit 0
                  git push

            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: turnip-${{ needs.validate-inputs.outputs.mesa_version }}
                  name: Turnip ${{ needs.validate-inputs.outputs.mesa_version }}
                  body_path: release_body.md
                  draft: false
                  prerelease: false
                  make_latest: true
                  files: |
                      ./artifacts/turnip-${{ needs.validate-inputs.outputs.mesa_version }}-aarch64/turnip-${{ needs.validate-inputs.outputs.mesa_version }}-aarch64.zip
                      ./artifacts/turnip-${{ needs.validate-inputs.outputs.mesa_version }}-arm/turnip-${{ needs.validate-inputs.outputs.mesa_version }}-arm.zip
